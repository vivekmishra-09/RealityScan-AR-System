<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REALITYSCAN_OS_v6</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>
</head>
<body>
    <div id="os-container">
        <section id="view-scanner" class="view active">
            <video id="v-feed" autoplay playsinline></video>
            <canvas id="qr-canvas" class="overlay"></canvas>
            
            <div class="hud-overlay">
                <div class="reticle"></div>
                <div class="telemetry">
                    <p>KERNEL: 6.0.2</p>
                    <p>SENSORS: <span id="sys-status" class="blink">READY</span></p>
                </div>
            </div>

            <nav class="action-bar glass">
                <button id="btn-qr-mode" class="side-btn">READ_QR</button>
                <button id="btn-capture" class="main-btn">CAPTURE_SPATIAL</button>
                <button id="btn-archive" class="side-btn">ARCHIVE</button>
            </nav>
        </section>

        <section id="view-render" class="view">
            <div id="canvas-3d"></div>
            <div class="render-panel glass">
                <header>
                    <h2 id="obj-id">OBJ_NULL</h2>
                    <div id="obj-metrics">DIM: 0x0x0 CM | VOL: 0.0L</div>
                </header>
                <div class="tool-grid">
                    <button id="toggle-lidar" class="tool-btn">LIDAR_VIEW</button>
                    <button id="gen-anchor" class="tool-btn">GEN_ANCHOR</button>
                    <button id="btn-exit" class="tool-btn danger">EXIT</button>
                </div>
            </div>
        </section>

        <div id="modal-anchor" class="modal hidden">
            <div class="modal-content glass">
                <h3>SPATIAL_ANCHOR</h3>
                <div id="qr-output"></div>
                <button id="close-modal" class="main-btn">DISMISS</button>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
